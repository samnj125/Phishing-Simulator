<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishSim - {% block title %}Dashboard{% endblock %}</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #222;
      }
      nav {
        background: #1a1a2e;
        color: white;
        padding: 14px 32px;
        display: flex;
        align-items: center;
        gap: 24px;
      }
      nav a {
        color: #a0aec0;
        text-decoration: none;
        font-size: 14px;
      }
      nav a:hover {
        color: white;
      }
      nav .brand {
        color: white;
        font-weight: 600;
        font-size: 18px;
        margin-right: auto;
      }
      .container {
        max-width: 960px;
        margin: 40px auto;
        padding: 0 24px;
      }
      .card {
        background: white;
        border-radius: 10px;
        padding: 28px;
        margin-bottom: 20px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      .btn {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        text-decoration: none;
      }
      .btn-primary {
        background: #4f46e5;
        color: white;
      }
      .btn-primary:hover {
        background: #4338ca;
      }
      .btn-danger {
        background: #ef4444;
        color: white;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        margin-top: 6px;
      }
      label {
        font-size: 13px;
        font-weight: 500;
        color: #555;
      }
      .form-group {
        margin-bottom: 16px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        text-align: left;
        padding: 10px 12px;
        background: #f8f8f8;
        border-bottom: 2px solid #eee;
        color: #555;
        font-weight: 500;
      }
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #f0f0f0;
      }
      .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
      }
      .badge-green {
        background: #dcfce7;
        color: #16a34a;
      }
      .badge-red {
        background: #fee2e2;
        color: #dc2626;
      }
      .badge-yellow {
        background: #fef9c3;
        color: #ca8a04;
      }
      .badge-gray {
        background: #f1f5f9;
        color: #64748b;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-box {
        background: white;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      .stat-box .number {
        font-size: 32px;
        font-weight: 700;
        color: #4f46e5;
      }
      .stat-box .label {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 20px;
      }
      h2 {
        font-size: 18px;
        margin-bottom: 16px;
      }
      .mt {
        margin-top: 20px;
      }
      .flex {
        display: flex;
        align-items: center;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <nav>
      <span class="brand">PhishSim</span>
      <a href="/">Campaigns</a>
      <a href="/campaign/new">New Campaign</a>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
